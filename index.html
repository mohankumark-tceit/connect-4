<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connect 4 - Strategic Expert AI</title>
    <style>
        :root { --bg: #050505; --player: #00ff88; --ai: #0077ff; --board: #1a1a1a; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .board { display: grid; grid-template-columns: repeat(7, 60px); gap: 10px; background: var(--board); padding: 15px; border-radius: 15px; border: 2px solid #333; }
        .cell { width: 60px; height: 60px; background: #000; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .cell.player { background: var(--player); box-shadow: 0 0 20px var(--player); }
        .cell.ai { background: var(--ai); box-shadow: 0 0 20px var(--ai); }
        #status { margin: 25px; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        button { background: transparent; color: white; border: 1px solid #555; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #333; }
    </style>
</head>
<body>
    <div id="status">Your Turn</div>
    <div class="board" id="board"></div>
    <button onclick="location.reload()">Reset Game</button>

    <script>
        const ROWS = 6, COLS = 7, EMPTY = 0, PLAYER = 1, AI = 2;
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(EMPTY));
        let gameActive = true;

        function createBoard() {
            const b = document.getElementById('board');
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.onclick = () => handleMove(c);
                    b.appendChild(cell);
                }
            }
        }

        function handleMove(c) {
            if (!gameActive) return;
            let r = getOpenRow(c);
            if (r === -1) return;
            
            makeMove(r, c, PLAYER);
            if (checkWin(PLAYER)) return endGame("You Win!");
            if (isFull()) return endGame("Draw!");

            gameActive = false;
            document.getElementById('status').innerText = "AI is calculating...";
            setTimeout(aiTurn, 300);
        }

        function aiTurn() {
            // Depth 5 is the sweet spot for browser performance vs intelligence
            let [bestCol] = minimax(board, 5, -Infinity, Infinity, true);
            let r = getOpenRow(bestCol);
            makeMove(r, bestCol, AI);
            if (checkWin(AI)) return endGame("AI Wins!");
            if (isFull()) return endGame("Draw!");
            gameActive = true;
            document.getElementById('status').innerText = "Your Turn";
        }

        function makeMove(r, c, p) {
            board[r][c] = p;
            document.getElementById(`cell-${r}-${c}`).classList.add(p === PLAYER ? 'player' : 'ai');
        }

        function getOpenRow(c) {
            for (let r = ROWS - 1; r >= 0; r--) if (board[r][c] === EMPTY) return r;
            return -1;
        }

        function isFull() { return board[0].every(cell => cell !== EMPTY); }

        // --- ENHANCED HEURISTIC ---
        // Weights: Center columns are much more valuable for strategic control
        function scorePosition(b, p) {
            let score = 0;
            const centerArray = b.map(row => row[Math.floor(COLS/2)]);
            score += centerArray.filter(cell => cell === p).length * 3;

            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS-3; c++) {
                    let window = b[r].slice(c, c+4);
                    score += evaluateWindow(window, p);
                }
            }
            return score;
        }

        function evaluateWindow(window, p) {
            let score = 0;
            let opp = p === PLAYER ? AI : PLAYER;
            let pCount = window.filter(x => x === p).length;
            let eCount = window.filter(x => x === EMPTY).length;
            let oCount = window.filter(x => x === opp).length;

            if (pCount === 4) score += 100;
            else if (pCount === 3 && eCount === 1) score += 5;
            else if (pCount === 2 && eCount === 2) score += 2;
            
            if (oCount === 3 && eCount === 1) score -= 80; // High priority block
            return score;
        }

        function minimax(b, depth, alpha, beta, isMax) {
            let validCols = [];
            for(let c=0; c<COLS; c++) if(getOpenRow(c) !== -1) validCols.push(c);
            
            if (depth === 0 || checkWin(PLAYER) || checkWin(AI)) {
                if (checkWin(AI)) return [null, 10000];
                if (checkWin(PLAYER)) return [null, -10000];
                return [null, scorePosition(b, AI)];
            }

            let bestCol = validCols[Math.floor(Math.random() * validCols.length)];
            if (isMax) {
                let maxEval = -Infinity;
                for (let c of validCols) {
                    let r = getOpenRow(c);
                    board[r][c] = AI;
                    let val = minimax(board, depth - 1, alpha, beta, false)[1];
                    board[r][c] = EMPTY;
                    if (val > maxEval) { maxEval = val; bestCol = c; }
                    alpha = Math.max(alpha, val);
                    if (beta <= alpha) break;
                }
                return [bestCol, maxEval];
            } else {
                let minEval = Infinity;
                for (let c of validCols) {
                    let r = getOpenRow(c);
                    board[r][c] = PLAYER;
                    let val = minimax(board, depth - 1, alpha, beta, true)[1];
                    board[r][c] = EMPTY;
                    if (val < minEval) { minEval = val; bestCol = c; }
                    beta = Math.min(beta, val);
                    if (beta <= alpha) break;
                }
                return [bestCol, minEval];
            }
        }

        function checkWin(p) {
            for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
                if (board[r][c] !== p) continue;
                if (c + 3 < COLS && board[r][c+1] === p && board[r][c+2] === p && board[r][c+3] === p) return true;
                if (r + 3 < ROWS && board[r+1][c] === p && board[r+2][c] === p && board[r+3][c] === p) return true;
                if (r + 3 < ROWS && c + 3 < COLS && board[r+1][c+1] === p && board[r+2][c+2] === p && board[r+3][c+3] === p) return true;
                if (r + 3 < ROWS && c - 3 >= 0 && board[r+1][c-1] === p && board[r+2][c-2] === p && board[r+3][c-3] === p) return true;
            }
            return false;
        }

        function endGame(msg) {
            gameActive = false;
            document.getElementById('status').innerText = msg;
        }

        createBoard();
    </script>
</body>
</html>
